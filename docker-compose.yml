version: "3.8"

services:
  go:
    image: golang:1.26-alpine
    container_name: go-gin-tutorial

    working_dir: /app

    volumes:
      - ./:/app

    ports:
      - "8080:8080"

    tty: true
    stdin_open: true

    environment:
      - GOPROXY=https://goproxy.io,direct
      - GOSUMDB=sum.golang.google.cn
      - CGO_ENABLED=0

    command: tail -f /dev/null